models:
  detector:
    name: hybrid_person
    enabled: true
    backend: opencv
    weights: models/onnx/yolox_s.onnx
    input_width: 640
    input_height: 640
    confidence_threshold: 0.2
    nms_threshold: 0.45
    person_class_id: 0
    providers:
      - DmlExecutionProvider
      - CPUExecutionProvider
    available:
      - hybrid_person
      - motion_blob
      - hog_person
      - yolox_onnx

  tracker:
    name: bytetrack
    enabled: true
    lost_track_buffer: 30
    track_activation_threshold: 0.25
    minimum_matching_threshold: 0.8
    minimum_consecutive_frames: 1
    frame_rate: 15
    available:
      - centroid
      - bytetrack

  face_landmarks:
    name: mediapipe_face_landmarker
    enabled: false
    model_asset_path: models/mediapipe/face_landmarker_v2.task
    refine_landmarks: true
    max_num_faces: 1
    min_detection_confidence: 0.4
    min_tracking_confidence: 0.4

  expression:
    name: onnx_mobilefacenet_fer
    enabled: true
    weights: models/onnx/facial_expression_recognition_mobilefacenet_2022july.onnx
    fallback_to_proxy: false
    providers:
      - DmlExecutionProvider
      - CPUExecutionProvider
    labels:
      - angry
      - disgust
      - fearful
      - happy
      - neutral
      - sad
      - surprised
    face_detector:
      enabled: true
      model_path: models/onnx/face_detection_yunet_2023mar.onnx
      score_threshold: 0.65
      nms_threshold: 0.3
      top_k: 5000

  pose:
    name: bbox_pose_heuristic
    enabled: true
    model_asset_path: models/mediapipe/pose_landmarker.task
    model_complexity: 0
    min_detection_confidence: 0.4
    min_tracking_confidence: 0.4

  class_state:
    name: rules_v1
    enabled: true

  performance:
    visible_face_count_interval: 3
    visible_face_count_max_width: 960
    visible_face_min_size: 12
    expression_interval: 3
    max_expression_tracks: 6
